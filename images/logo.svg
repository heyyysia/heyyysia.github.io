<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&amp;family=DM+Sans:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- 上方細線裝飾 -->
  <line x1="60" y1="30" x2="300" y2="30" stroke="#C4A882" stroke-width="0.6" opacity="0.7"/>

  <!-- 主標題 heyyysia -->
  <text
    x="180"
    y="74"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="54"
    font-style="italic"
    font-weight="300"
    fill="#1A1A1A"
    letter-spacing="3"
  >heyyysia</text>

  <!-- 下方裝飾：細線 + 小點 + 細線 -->
  <line x1="60" y1="90" x2="155" y2="90" stroke="#C4A882" stroke-width="0.6" opacity="0.7"/>
  <circle cx="180" cy="90" r="2.5" fill="#C4A882" opacity="0.9"/>
  <line x1="205" y1="90" x2="300" y2="90" stroke="#C4A882" stroke-width="0.6" opacity="0.7"/>

  <!-- 副標 -->
  <text
    x="180"
    y="110"
    text-anchor="middle"
    font-family="'DM Sans', sans-serif"
    font-size="8.5"
    font-weight="300"
    fill="#888880"
    letter-spacing="4"
  >TRAVEL JOURNAL</text>
</svg>
